<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>100 AI Tools for Students</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0f0f5;
    --muted: #8888a0;
    --accent: #7c6fff;
    --accent2: #ff6b9d;
    --accent3: #00d4aa;
    --pill-bg: rgba(124,111,255,0.12);
    --pill-text: #a99fff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% -10%, rgba(124,111,255,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 110%, rgba(0,212,170,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,107,157,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 64px 24px 48px;
    border-bottom: 1px solid var(--border);
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--pill-bg);
    border: 1px solid rgba(124,111,255,0.25);
    color: var(--pill-text);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  .header-badge::before { content: '✦'; font-size: 9px; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, #c8c0ff 40%, #ff6b9d 75%, #ff9a5c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 16px;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto 32px;
    line-height: 1.6;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    max-width: 520px;
    margin: 0 auto 20px;
  }
  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    width: 16px; height: 16px;
  }
  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 12px 18px 12px 44px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus {
    border-color: rgba(124,111,255,0.5);
    box-shadow: 0 0 0 3px rgba(124,111,255,0.1);
  }
  #search::placeholder { color: var(--muted); }

  /* ── FILTER TABS ── */
  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 16px rgba(124,111,255,0.35);
  }

  /* ── STATS BAR ── */
  .stats {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .stats span strong { color: var(--text); font-weight: 500; }

  /* ── GRID ── */
  main {
    position: relative;
    z-index: 2;
    padding: 28px 24px 64px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s, background 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    background: radial-gradient(ellipse at 0% 0%, rgba(124,111,255,0.08), transparent 70%);
    pointer-events: none;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    background: var(--surface2);
  }
  .card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .logo-wrap {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo-wrap img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: 4px;
  }
  .logo-wrap .fallback {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    display: none;
  }

  .arrow-icon {
    width: 20px;
    height: 20px;
    color: var(--muted);
    opacity: 0;
    transform: translate(-4px, 4px);
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .card:hover .arrow-icon { opacity: 1; transform: translate(0, 0); }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .card-desc {
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.5;
    flex: 1;
  }
  .card-cat {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 100px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  /* Category colors */
  .cat-chatai    { background: rgba(124,111,255,0.15); color: #a99fff; }
  .cat-writing   { background: rgba(255,107,157,0.15); color: #ff9ec5; }
  .cat-coding    { background: rgba(0,212,170,0.15);   color: #00d4aa; }
  .cat-research  { background: rgba(59,130,246,0.15);  color: #7eb5fa; }
  .cat-design    { background: rgba(251,146,60,0.15);  color: #fca96a; }
  .cat-math      { background: rgba(34,197,94,0.15);   color: #6ee09a; }
  .cat-productivity { background: rgba(234,179,8,0.15); color: #fcd34d; }
  .cat-language  { background: rgba(236,72,153,0.15);  color: #f07ec4; }
  .cat-video     { background: rgba(239,68,68,0.15);   color: #f89090; }

  /* ── NO RESULTS ── */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 15px;
  }
  .no-results span { font-size: 40px; display: block; margin-bottom: 12px; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp 0.4s ease both; }

  @media (max-width: 600px) {
    h1 { font-size: 32px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
    main { padding: 20px 12px 48px; }
    .stats { padding: 12px 16px; }
  }
</style>
</head>

function getCatClass(cat) {
  const map = {
    "Chat AI":"chatai","Writing":"writing","Coding":"coding",
    "Research":"research","Design":"design","Math":"math",
    "Productivity":"productivity","Language":"language","Video":"video"
  };
  return "cat-" + (map[cat] || "chatai");
}

function buildCard(t, i) {
  const catClass = getCatClass(t.cat);
  const delay = (i % 20) * 30;
  return `<a class="card" href="${t.url}" target="_blank" rel="noopener noreferrer" style="animation-delay:${delay}ms">
    <div class="card-top">
      <div class="logo-wrap" id="lw-${i}">
        <img
          src="https://www.google.com/s2/favicons?domain=${t.domain}&sz=64"
          alt="${t.name} logo"
          onload="this.style.display='block'; this.parentElement.querySelector('.fallback').style.display='none';"
          onerror="this.style.display='none'; this.parentElement.querySelector('.fallback').style.display='flex';"
          style="display:block;"
        />
        <span class="fallback" style="display:none;width:100%;height:100%;align-items:center;justify-content:center;">${t.name.slice(0,2).toUpperCase()}</span>
      </div>
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M7 17L17 7M17 7H7M17 7v10"/>
      </svg>
    </div>
    <div class="card-name">${t.name}</div>
    <div class="card-desc">${t.desc}</div>
    <span class="card-cat ${catClass}">${t.cat}</span>
  </a>`;
}

let activecat = "All";
let searchq = "";

function render() {
  const q = searchq.toLowerCase();
  const filtered = tools.filter((t, i) => {
    const catOk = activecat === "All" || t.cat === activecat;
    const sOk = !q || t.name.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q);
    return catOk && sOk;
  });
  document.getElementById("count").textContent = filtered.length;
  const html = filtered.length
    ? filtered.map((t, i) => buildCard(t, i)).join("")
    : `<div class="no-results"><span>🔍</span>No tools found for "<strong>${searchq}</strong>"</div>`;
  document.getElementById("grid").innerHTML = html;
}

function setCategory(cat) {
  activecat = cat;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.textContent.includes(cat === "All" ? "All" : cat));
  });
  render();
}

function filterAll() {
  searchq = document.getElementById("search").value;
  render();
}

render();
</script>
